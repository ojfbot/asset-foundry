name: ci
on:
  push:
    branches: [main]
  pull_request:

jobs:
  schema-and-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: typecheck
        run: pnpm typecheck

      - name: foundry-agnostic lint (ADR-0007)
        run: pnpm lint:agnostic

      - name: test (schema + loader against test-fixtures/ target)
        run: pnpm test

      - name: validate manifest schema (test-fixtures target)
        run: pnpm validate:manifest --target ./test-fixtures

      - name: MCP server smoke test (ADR-0009)
        run: pnpm test:mcp

  # Phase 1 leaves the per-target validation gate (`pnpm validate`) out of CI
  # — it walks <target>/asset-foundry/dist/ which only exists on the consumer
  # game's CI runner, not here. Each consumer is responsible for running
  # `pnpm validate --target .` from its own asset-foundry checkout.
  #
  # Phase 0 keeps Blender out of CI; the offline fixture path runs locally
  # via `pnpm gen-asset`. Phase 2 will add a blender-pipeline-smoke job that
  # installs the pinned Blender LTS and runs gen-asset on a representative
  # prop, comparing the .glb hash against a committed baseline.
